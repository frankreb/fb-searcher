services:
  fb-searcher:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ./cookies:/app/cookies
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/fb-searcher.db
      - FB_COOKIES_PATH=/app/cookies/cookies.json
